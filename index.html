<!doctype html>
<html lang="en">
  <head>
    <!-- Basic -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Title -->
    <title>Benchmark Application</title>

    <!-- SEO Meta -->
    <meta
      name="description"
      content="Benchmark Application is a fast, modern, and responsive web platform built for better performance and user experience."
    />
    <meta
      name="keywords"
      content="Benchmark, web application, React app, modern website, frontend development, responsive design"
    />
    <meta name="author" content="Ahasan Habib" />
    <meta name="robots" content="index, follow" />

    <!-- Theme -->
    <meta name="theme-color" content="#0f172a" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Benchmark Application" />
    <meta
      property="og:description"
      content="Modern and high-performance web application with responsive UI and smooth experience."
    />
    <meta property="og:image" content="/preview.png" />
    <meta property="og:url" content="https://yourwebsite.com" />
    <meta property="og:site_name" content="Benchmark" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Benchmark Application" />
    <meta
      name="twitter:description"
      content="Modern and responsive web application for better user experience."
    />
    <meta name="twitter:image" content="/preview.png" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/favicon.png" />

    <!-- Canonical URL -->
    <link rel="canonical" href="https://yourwebsite.com" />

    <!-- Fonts (Optional) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Structured Data -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": "Benchmark Application",
        "url": "https://yourwebsite.com",
        "description": "Modern and responsive web application."
      }
    </script>
  </head>

  <body>
    <div id="root"></div>

    <!-- Main React Entry -->
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
